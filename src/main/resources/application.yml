# ===========================================================
# SIDMS — Secure IAC Data Management System
# Application Configuration
# ===========================================================

server:
  port: 8080

spring:
  application:
    name: SIDMS

  # ---- MySQL DataSource ----
  datasource:
    url: jdbc:mysql://localhost:3306/sidms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SIDMS_DB_USERNAME:root}
    password: ${SIDMS_DB_PASSWORD:Soh@m.mysql#31}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  # ---- Email / SMTP ----
  mail:
    host: ${SIDMS_MAIL_HOST:smtp.gmail.com}
    port: ${SIDMS_MAIL_PORT:587}
    username: ${SIDMS_MAIL_USERNAME:your-email@gmail.com}
    password: ${SIDMS_MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connection-timeout: 5000
          timeout: 5000
          write-timeout: 5000

# ---- JWT Configuration ----
sidms:
  jwt:
    secret: ${SIDMS_JWT_SECRET:c2lkbXMtc2VjdXJlLWp3dC1zZWNyZXQta2V5LXRoYXQtaXMtYXQtbGVhc3QtMjU2LWJpdHMtbG9uZw==}
    expiration-ms: 3600000  # 1 hour

  # ---- AES-256 Encryption Key (Base64-encoded 32 bytes) ----
  encryption:
    key: ${SIDMS_AES_KEY:}

  # ---- OTP Configuration ----
  otp:
    expiry-minutes: 5
    length: 6

  # ---- CORS Configuration ----
  cors:
    allowed-origins: ${SIDMS_CORS_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

# ---- Swagger / OpenAPI ----
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ---- Logging ----
logging:
  level:
    com.sidms: INFO
    org.springframework.security: WARN
